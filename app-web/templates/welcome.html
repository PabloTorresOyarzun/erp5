<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #28a745;
            margin-bottom: 20px;
        }
        .user-info {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: left;
        }
        .user-info p {
            margin: 10px 0;
            color: #333;
        }
        .info-section {
            margin: 15px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            text-align: left;
        }
        .info-section h3 {
            margin-top: 0;
            color: #555;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px;
            background: #007bff;
            color: white;
            border-radius: 15px;
            font-size: 14px;
        }
        .badge.role {
            background: #28a745;
        }
        .badge.group {
            background: #6c757d;
        }
        .logout-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Bienvenido!</h1>
        <div class="user-info">
            <p><strong>Usuario:</strong> {{ username }}</p>
            <p><strong>Email:</strong> {{ email }}</p>
        </div>
        
        {% if groups %}
        <div class="info-section">
            <h3>Grupos:</h3>
            {% for group in groups %}
                <span class="badge group">{{ group }}</span>
            {% endfor %}
        </div>
        {% endif %}
        
        {% if roles %}
        <div class="info-section">
            <h3>Permisos:</h3>
            {% for role in roles %}
                <span class="badge role">{{ role }}</span>
            {% endfor %}
        </div>
        {% endif %}
        
        <a href="/logout" class="logout-btn">Cerrar Sesión</a>
        
        <!-- Debug info (quitar en producción) -->
        <div style="margin-top: 30px; font-size: 12px; color: #999;">
            <a href="/api/debug" target="_blank">Ver debug info</a>
        </div>
    </div>
</body>
</html>
